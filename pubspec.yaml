name: oxplayer
description: Oxplayer Android client — Flutter (TDLib + media_kit + Isar).
publish_to: "none"
# Local/dev default. GitHub Actions release sets --build-name/--build-number to 1.0.<run_number> (see release.yml).
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Stay on v2 until Isar migrates: Riverpod 3 + isar_generator + flutter_test conflict on pub.
  flutter_riverpod: ^2.6.1
  go_router: ^17.1.0

  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  flutter_dotenv: ^6.0.0

  dio: ^5.7.0
  tmdb_api: ^2.2.0
  cached_network_image: ^3.4.1
  device_info_plus: ^11.2.0

  shelf: ^1.4.2

  intl: ^0.20.1
  collection: ^1.19.0
  # Native libtdjson.so in android/app/src/main/jniLibs must match this package (see jniLibs/README.txt). "Wrong version 54" = replace .so.
  tdlib: ^1.6.0
  qr_flutter: ^4.1.0
  video_thumbnail: ^0.5.6
  material_symbols_icons: ^4.2928.1
  window_manager: ^0.5.1
  provider: ^6.1.5+1
  url_launcher: ^6.3.2
  mobile_scanner: ^7.2.0
  flex_color_picker: ^3.8.0
  flutter_svg: ^2.2.4
  file_picker: 8.1.4
  os_media_controls:
    git: https://github.com/edde746/os-media-controls
  sentry_flutter: ^9.16.1
  auto_updater: ^1.0.0
  logger: ^2.7.0
  uuid: ^4.5.3
  web_socket_channel: ^3.0.3
  dio_http2_adapter: ^2.7.0
  package_info_plus: ^9.0.1
  rate_limiter: ^1.0.0
  universal_gamepad: ^1.5.4
  in_app_review: ^2.0.11
  dart_discord_presence: ^1.2.0
  background_downloader: ^9.5.4
  connectivity_plus: ^7.1.0
  drift: ^2.32.1
  crypto: ^3.0.7
  saf_util: ^2.0.0
  saf_stream: ^2.0.0
  flutter_cache_manager: ^3.4.1
  duration: ^4.0.3
  slang: ^4.14.0
  wakelock_plus: ^1.5.1
  slang_flutter: ^4.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  # isar_generator 3.1.x requires build ^2.x; build_runner 2.9+ pulls build ^4 (incompatible).
  build_runner: ^2.13.1
  drift_dev: ^2.32.1
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/env/default.env
    - assets/icon.png

flutter_launcher_icons:
  android: true
  image_path: assets/icon.png
