name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID || vars.TELEGRAM_API_ID }}
  TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH || vars.TELEGRAM_API_HASH }}
  BOT_USERNAME: ${{ vars.BOT_USERNAME || secrets.BOT_USERNAME }}
  OXPLAYER_API_BASE_URL: ${{ vars.OXPLAYER_API_BASE_URL || secrets.OXPLAYER_API_BASE_URL }}
  OXPLAYER_TELEGRAM_WEBAPP_SHORT_NAME: ${{ vars.OXPLAYER_TELEGRAM_WEBAPP_SHORT_NAME || secrets.OXPLAYER_TELEGRAM_WEBAPP_SHORT_NAME }}
  OXPLAYER_TELEGRAM_WEBAPP_URL: ${{ vars.OXPLAYER_TELEGRAM_WEBAPP_URL || secrets.OXPLAYER_TELEGRAM_WEBAPP_URL }}
  SUBDL_API_KEY: ${{ secrets.SUBDL_API_KEY || vars.SUBDL_API_KEY }}
  # Product version for release builds: 1.40.<patch> where patch is the workflow run number (GitHub-assigned).
  OXPLAYER_VERSION_NAME: 1.40.${{ github.run_number }}

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${OXPLAYER_VERSION_NAME}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Version must be in semantic versioning format (e.g., 1.40.19)"
            exit 1
          fi

      - name: Validate required app environment
        shell: bash
        run: |
          required_vars=(
            TELEGRAM_API_ID
            TELEGRAM_API_HASH
            BOT_USERNAME
            OXPLAYER_API_BASE_URL
            OXPLAYER_TELEGRAM_WEBAPP_SHORT_NAME
            OXPLAYER_TELEGRAM_WEBAPP_URL
            SUBDL_API_KEY
          )

          missing_vars=()
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              missing_vars+=("$var_name")
            fi
          done

          if [ ${#missing_vars[@]} -gt 0 ]; then
            echo "Missing required release environment variables: ${missing_vars[*]}"
            exit 1
          fi

      - name: Extract current build number
        id: get_build
        run: |
          # Extract current build number from pubspec.yaml
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          CURRENT_BUILD=$(echo "$CURRENT_VERSION" | cut -d'+' -f2)
          NEW_BUILD=$((CURRENT_BUILD + 1))

          echo "current_build=$CURRENT_BUILD" >> $GITHUB_OUTPUT
          echo "new_build=$NEW_BUILD" >> $GITHUB_OUTPUT
          echo "Current build: $CURRENT_BUILD"
          echo "New build: $NEW_BUILD"

      - name: Update pubspec.yaml
        run: |
          NEW_VERSION="${OXPLAYER_VERSION_NAME}+${{ steps.get_build.outputs.new_build }}"
          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
          echo "Updated version to: $NEW_VERSION"
          cat pubspec.yaml | grep '^version:'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          git add pubspec.yaml
          git commit -m "chore: bump version to $OXPLAYER_VERSION_NAME"

      - name: Create Git tag
        run: |
          git tag "v$OXPLAYER_VERSION_NAME"
          echo "Created tag: v$OXPLAYER_VERSION_NAME"

      - name: Push changes and tag
        run: |
          git push origin main
          git push origin --tags

      - name: Build workflow handoff
        run: echo "Version bump pushed to main. The build workflow will run automatically on push."
