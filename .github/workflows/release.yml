name: Build and Release

on:
  push:
    branches:
      - main
      - master # In case the main branch is named master
  workflow_dispatch: # Allows manual trigger

jobs:
  build_and_release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating releases

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get

      - name: Prepare environment variables
        run: cp assets/env/default.example.env assets/env/default.env

      - name: Run Build Runner (Isar Generation)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Build AppBundle
        run: flutter build appbundle --release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # Use the run number for unique versions alongside the commit SHA
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Release v1.0.${{ github.run_number }}"
          body: "Automated Release triggered by push to ${{ github.ref_name }}. \nCommit: ${{ github.sha }}"
          files: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
